        function loadProducts(){
            const currentState = { 
                
            }

            const orderState = {paymentMethod: 'paypal-opt'}
            const productList = [PRODUCTSJSON]

            const renderSelection = ()=>{

                
                let tpl = `   <div class="flex items-center justify-between mb-6">
<h2 class="text-xl font-bold flex items-center gap-2">
<span class="material-symbols-outlined text-primary">shopping_basket</span>
                            Mi Pedido
                        </h2>
<span class="text-xs font-bold bg-slate-100 dark:bg-primary/20 px-2 py-1 rounded text-slate-500 dark:text-primary">${Object.keys(currentState).length} Elementos</span>
</div>
<div class="flex-1 overflow-y-auto pr-2 space-y-4 mb-6 hide-scrollbar" >
    [CARTITEMS]
</div>
<div class="border-t border-slate-200 dark:border-primary/20 pt-6 space-y-3">
<div class="flex justify-between text-slate-500 dark:text-slate-400 text-sm">
<span>Subtotal</span>
<span>[SUBTOTAL]</span>
</div>
<div class="flex justify-between text-slate-900 dark:text-white font-800 text-xl pt-2">
<span>Total</span>
<span class="text-primary">[TOTAL]</span>
</div>
<button class="w-full bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 mt-4 flex items-center justify-center gap-2 hover:bg-primary/90 transition-transform active:scale-95" onclick="completeOrderCart()">
                            Completar pedido
                            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>`    
                const renderItem = (p)=>{
                    if(!p){ return '' }
                    const {id,name,image,price,description} = p
                    const cartItemTpl = `
<div class="flex gap-3">
<div class="w-16 h-16 rounded-xl overflow-hidden bg-slate-100 shrink-0">
<img class="w-full h-full object-cover" data-alt="${name}" src="${image}"/>
</div>
<div class="flex-1">
<div class="flex justify-between">
<h4 class="font-bold text-sm">${name}</h4>
<span class="font-bold text-sm">$${parseFloat(price+'').toFixed(2)}</span>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center gap-2 bg-slate-100 dark:bg-primary/10 rounded-lg px-2 py-1">
<button onclick="removeItem(${id})" class="text-primary hover:bg-white rounded-md p-0.5"><span class="material-symbols-outlined text-sm">remove</span></button>
<span class="text-xs font-bold w-4 text-center">${currentState[id]}</span>
<button onclick="addToOrder(${id})"  class="text-primary hover:bg-white rounded-md p-0.5"><span class="material-symbols-outlined text-sm">add</span></button>
</div>
<button onclick="removeAllItems(${id})"  class="text-slate-400 hover:text-red-500"><span class="material-symbols-outlined text-sm">delete</span></button>
</div>
</div>
</div>`
return cartItemTpl
                } 
                const cartItems = Object.keys(currentState).map(pId=>{
                    const qty = currentState[pId]
                    const product = productList.find(p=>p.id == pId)  
                    return renderItem(product)  
                    
                }).join('')
                tpl = tpl.replace('[CARTITEMS]',cartItems)
                const subtotal = Object.keys(currentState).map(pId=>{
                    const qty = currentState[pId]
                    const product = productList.find(p=>p.id+'' == pId+'')  
                    if(!product){ return 0 }
                    return qty * product.price
                }).reduce((a,b)=>a+b,0)
                tpl = tpl.replace('[SUBTOTAL]',subtotal.toFixed(2))
                const delivery = 0
                tpl = tpl.replace('[DELIVERY]',delivery.toFixed(2))
                const total = subtotal + delivery
                tpl = tpl.replace('[TOTAL]',total.toFixed(2))

                document.querySelector('#cart-selection').innerHTML = tpl
                
            }

            const renderSummary = ()=>{

                const renderItem = (p)=>{
                    if(!p){ return '' }
                    const {id,name,image,price,description} = p
                    const qty = currentState[id]
                    const total = parseFloat(price+'') * qty
                    return `<!-- Item 1 -->
<div class="flex items-start">
<img alt="${name}" class="w-16 h-16 rounded object-cover" src="${image}"/>
<div class="ml-4 flex-1">
<div class="flex justify-between">
<h4 class="font-bold text-sm">${name}</h4>
<span class="font-bold text-sm">$${total.toFixed(2)}</span>
</div>
<p class="text-xs text-gray-500 line-clamp-1">${description}</p>
<span class="text-xs font-semibold">x: ${qty}</span>
</div>
</div>`
                
                }
                const cartItems = Object.keys(currentState).map(pId=>{
                    
                    const product = productList.find(p=>p.id == pId) 
                    if(product && product?.id){
                        return renderItem(product)      
                    }else{
                        return ''
                    }
                    
                }).join('')
                document.querySelector('[data-purpose="summary-items"]').innerHTML = cartItems
                const subtotal = Object.keys(currentState).map(pId=>{
                    const qty = currentState[pId]
                    const product = productList.find(p=>p.id == pId) 
                    if(!product){ return 0 }
                    
                    return qty * product.price
                }).reduce((a,b)=>a+b,0);
                const breakdown = `<div class="flex justify-between text-sm">
<span class="text-gray-600">Subtotal</span>
<span class="font-semibold text-gray-800">$${subtotal.toFixed(2)}</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-gray-600">Impuestos (IVA 10%)</span>
<span class="font-semibold text-gray-800">$${(subtotal*0.10).toFixed(2)}</span>
</div>
<div class="flex justify-between text-lg font-bold pt-4 border-t border-dashed border-gray-200">
<span>Total</span>
<span class="text-porketaOrange">$${(subtotal + subtotal*0.10).toFixed(2)}</span>
</div>`
                document.querySelector('[data-purpose="price-breakdown"]').innerHTML = breakdown
              



            }

            window.addToOrder = (productId)=>{

                currentState[productId] = currentState[productId] || 0
                currentState[productId] += 1
                renderSelection()
            }
            window.removeItem = (productId)=>{
                if(currentState[productId] > 1){
                    currentState[productId] -= 1
                }else{
                    delete currentState[productId]
                }
                renderSelection()
            }
            window.removeAllItems = (productId)=>{
                delete currentState[productId]
                renderSelection()   
                
            }
            const paymentMethods = Array.from(document.querySelectorAll('input[name="payment"]'))
            const changeMethodListener = ev=>{
                const radioClass = 'text-porketaOrange focus:ring-porketaOrange'.split(' ');
                const contClass = 'border-porketaOrange bg-orange-50'.split(' ');
                const items = Array.from(document.querySelectorAll('input[name="payment"]'))
                items.forEach(it=>it.classList.remove(...radioClass))
                items.map(it=>it.parentElement).forEach(it=>it.classList.remove(...contClass))  
                ev.target.classList.add(...radioClass)
                ev.target.parentElement.classList.add(...contClass)
                orderState.paymentMethod = ev.target.getAttribute('id')

                if(orderState.paymentMethod == 'paypal'){
                }else{


                }
                
            }

            const confirmOrder = ()=>{
                const modal = document.querySelector('#paypal-popup')
                modal.classList.remove('hidden');
                let valid = true;
                ['full-name','email','phone'].forEach(f=>{
                    orderState[f] = document.querySelector(`[name=${f}]`).value
                    if(!orderState[f]){
                        valid = false
                        document.querySelector(`[name=${f}]`).focus()
                       
                    }
                })
                if(!valid){
                    document.querySelector('#paypal-popup').classList.add('hidden')
                    return  
                }
                orderState.cart = {}
                Object.keys(currentState).forEach(pId=>{
                    orderState.cart[pId] = currentState[pId]
                })

                

                if(orderState.paymentMethod == 'paypal-opt'){
                    
                    
                
                    loadPaypal(orderState)
                }else{
                    console.log('Process with TDD')
                }
                
            }

            paymentMethods.forEach(pm=>pm.addEventListener('change',changeMethodListener))
            window.completeOrderCart = ()=>{

                if(Object.keys(currentState).length > 0){

                     const orderInfo = document.getElementById('order-info-payment')

                     console.log(ch, orderInfo, currentState)
                     ch.classList.add('hidden')
                     orderInfo.classList.remove('hidden')
                     renderSummary()
                     

                }
               
            }

            window.completeOrderSimulate = (event)=>{
                orderState.cart = {}
                    Object.keys(currentState).forEach(pId=>{
                        orderState.cart[pId] = currentState[pId]
                    })
                fetch(window.window.ordersEndpointSimulate, {

                                // like product ids and quantities
                                body: JSON.stringify({

                                }),

                                r.json().then(data=>{

                                        //modal.classList.add('hidden')
                                        sessionStorage.currentOrder = data
                                        document.getElementById('paypal-button-container').classList.add('hidden')

                                        event.target.classList.add('hidden')
                                        window.successOrder = true
                                    }else{
                                    }
                                })
                            });

<div class="relative h-48 overflow-hidden">
<img class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" data-alt="${p.description}s" src="${p.image}"/>

</div>
<p class="text-slate-500 dark:text-slate-400 text-sm mb-6 flex-1">${p.description}</p>
<button class="w-full bg-slate-900 dark:bg-primary hover:bg-primary dark:hover:bg-primary/80 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors" onclick="addToOrder(${p.id})">
<span class="material-symbols-outlined text-xl">add_circle</span>
                                Agregar a la orden
                            </button>
</div></div>`
            }).join('')

            document.getElementById('food-grid').innerHTML = gridItems
            renderSelection()
        }
    </script>
    <script>
       function loadPaypal(order){
            if(window.loadedPaypal){
                return 
            }
            const paypalButtons = window.paypal.Buttons({
                style: {
                        shape: "rect",
                        layout: "vertical",
                        color: "gold",
                        label: "paypal",
                    },
                message: {
                        amount: 100,
                    },
                async createOrder(products) {
                        try {
                            const response = await fetch(window.window.ordersEndpoint, {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                },
                                // use the "body" param to optionally pass additional order information
                                // like product ids and quantities
                                body: JSON.stringify({
                                    ...order
                                }),
                            });

                            const orderData = await response.json();

                            if (orderData.id) {
                                return orderData.id;
                            }
                            const errorDetail = orderData?.details?.[0];
                            const errorMessage = errorDetail
                                ? `${errorDetail.issue} ${errorDetail.description} (${orderData.debug_id})`
                                : JSON.stringify(orderData);

                            throw new Error(errorMessage);
                        } catch (error) {
                            console.error(error);
                            // resultMessage(`Could not initiate PayPal Checkout...<br><br>${error}`);
                        }
                    },
                async onApprove(data, actions) {
                        try {
                            const response = await fetch(
                                window.window.ordersCatureEndpoint.replace('[ORDERID]', data.orderID),
                                {
                                    method: "POST",
                                    headers: {
                                        "Content-Type": "application/json",
                                    },
                                }
                            );

                            const orderData = await response.json();
                            // Three cases to handle:
                            //   (1) Recoverable INSTRUMENT_DECLINED -> call actions.restart()
                            //   (2) Other non-recoverable errors -> Show a failure message
                            //   (3) Successful transaction -> Show confirmation or thank you message

                            const errorDetail = orderData?.details?.[0];

                            if (errorDetail?.issue === "INSTRUMENT_DECLINED") {
                                // (1) Recoverable INSTRUMENT_DECLINED -> call actions.restart()
                                // recoverable state, per
                                // https://developer.paypal.com/docs/checkout/standard/customize/handle-funding-failures/
                                return actions.restart();
                            } else if (errorDetail) {
                                // (2) Other non-recoverable errors -> Show a failure message
                                throw new Error(
                                    `${errorDetail.description} (${orderData.debug_id})`
                                );
                            } else if (!orderData.purchase_units) {
                                throw new Error(JSON.stringify(orderData));
                            } else {
                                // (3) Successful transaction -> Show confirmation or thank you message
                                // Or go to another URL:  actions.redirect('thank_you.html');
                                const transaction =
                                    orderData?.purchase_units?.[0]?.payments?.captures?.[0] ||
                                    orderData?.purchase_units?.[0]?.payments
                                        ?.authorizations?.[0];
                                resultMessage(
                                    `Transacción rechazada ${transaction.status}: ${transaction.id}<br>
                        <br>See console for all available details`
                                );
                                console.log(
                                    "Capture result",
                                    orderData,
                                    JSON.stringify(orderData, null, 2)
                                );
                            }
                        } catch (error) {
                            console.error(error);
                            resultMessage(
                                `Lo sentimos, su transacción no pudo ser procesada...<br><br>${error}`
                            );
                        }
                    },

                
            });
            paypalButtons.render("#paypal-button-container");
            window.loadedPaypal = true

            // Example function to show a result to the user. Your site's UI library can be used instead.
            function resultMessage(message) {
                const container = document.querySelector("#result-message");
                container.innerHTML = message;
            }
            
        }
    </script>
